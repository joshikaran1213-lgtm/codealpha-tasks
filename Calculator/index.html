<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

<div class="calculator">
    <h2>Calculator</h2>

    <input type="text" id="display" readonly>

    <div class="buttons">
        <button onclick="clearDisplay()" class="red">AC</button>
        <button onclick="deleteLast()">DEL</button>
        <button onclick="appendValue('%')">%</button>
        <button onclick="appendValue('/')" class="orange">÷</button>

        <button onclick="appendValue('7')">7</button>
        <button onclick="appendValue('8')">8</button>
        <button onclick="appendValue('9')">9</button>
        <button onclick="appendValue('*')" class="orange">×</button>

        <button onclick="appendValue('4')">4</button>
        <button onclick="appendValue('5')">5</button>
        <button onclick="appendValue('6')">6</button>
        <button onclick="appendValue('-')" class="orange">−</button>

        <button onclick="appendValue('1')">1</button>
        <button onclick="appendValue('2')">2</button>
        <button onclick="appendValue('3')">3</button>
        <button onclick="appendValue('+')" class="orange">+</button>

        <button onclick="appendValue('0')" class="zero">0</button>
        <button onclick="appendValue('.')">.</button>
        <button onclick="calculate()" class="green">=</button>
        <button onclick="startVoice()">🎤</button>
    </div>

    <p class="info">
        Keyboard Support:<br>
        Numbers (0-9), + - * /, Enter (=), Backspace (Delete), Esc (Clear)
    </p>
</div>
<input type="number" id="value">

<select id="fromUnit">
    <option value="cm">Centimeter</option>
    <option value="m">Meter</option>
    <option value="km">Kilometer</option>
</select>

<select id="toUnit">
    <option value="cm">Centimeter</option>
    <option value="m">Meter</option>
    <option value="km">Kilometer</option>
</select>

<button onclick="convertUnit()">
Convert
</button>

<h2 id="result"></h2>
<script src="script.js"></script>

</body>
</html>
